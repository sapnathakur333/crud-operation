<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Car Manager{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #111827;
            background: #eef2ff;
            line-height: 1.6;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background: radial-gradient(circle at top, rgba(99,102,241,.12), transparent 32%),
                        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            color: #111827;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            max-width: 1080px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .app-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border-radius: 24px;
            background: rgba(255,255,255,.95);
            border: 1px solid rgba(148,163,184,.24);
            box-shadow: 0 20px 45px rgba(15,23,42,.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-title {
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-subtitle {
            color: #6b7280;
            font-size: .95rem;
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            min-height: 44px;
            border-radius: 999px;
            font-weight: 600;
            border: 1px solid transparent;
            transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease, color .15s ease;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button.primary {
            color: white;
            background: #4338ca;
            box-shadow: 0 14px 30px rgba(67,56,202,.15);
        }

        .button.secondary {
            color: #3730a3;
            background: #eef2ff;
        }

        .button.tertiary {
            color: #2563eb;
            background: #eff6ff;
        }

        .button.danger {
            color: white;
            background: #dc2626;
        }

        .button.small {
            padding: 0 14px;
            min-height: 36px;
            font-size: .95rem;
        }

        .main-content {
            display: grid;
            gap: 24px;
        }

        .panel {
            border-radius: 24px;
            background: white;
            border: 1px solid rgba(148,163,184,.22);
            box-shadow: 0 20px 45px rgba(15,23,42,.05);
            padding: 28px;
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 2rem;
            letter-spacing: -.03em;
        }

        .section-copy {
            margin: 0;
            color: #4b5563;
            max-width: 62ch;
        }

        .search-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            margin-bottom: 24px;
        }

        .text-input,
        .select-input,
        .textarea-input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 1rem;
            background: #f8fafc;
            color: #111827;
            outline: none;
        }

        .text-input:focus,
        .select-input:focus,
        .textarea-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99,102,241,.12);
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            padding: 24px;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,.98), #ffffff);
            border: 1px solid rgba(148,163,184,.18);
            box-shadow: 0 16px 36px rgba(15,23,42,.06);
        }

        .card-title {
            margin: 0 0 16px;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .meta-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 10px;
            color: #4b5563;
        }

        .meta-list li {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 16px;
            background: #f8fafc;
        }

        .meta-list strong {
            color: #111827;
            font-weight: 600;
        }

        .card-actions {
            margin-top: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .form-panel {
            padding: 32px;
            max-width: 680px;
        }

        .form-stack {
            display: grid;
            gap: 18px;
        }

        .form-group {
            display: grid;
            gap: 8px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin-top: 8px;
        }

        .form-help {
            margin: 0;
            color: #6b7280;
            font-size: .95rem;
        }

        .info-box {
            padding: 18px 22px;
            border-radius: 18px;
            background: #eef2ff;
            border: 1px solid rgba(99,102,241,.24);
            color: #3730a3;
        }

        .empty-state {
            padding: 28px;
            border-radius: 24px;
            border: 1px dashed rgba(99,102,241,.35);
            background: rgba(99,102,241,.06);
            text-align: center;
        }

        .pagination {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
        }

        .pagination a,
        .pagination span {
            border-radius: 999px;
            padding: 10px 16px;
            border: 1px solid rgba(148,163,184,.24);
            background: white;
            color: #374151;
        }

        .pagination span {
            font-weight: 600;
        }

        .app-footer {
            color: #6b7280;
            text-align: center;
            font-size: .95rem;
            margin-top: 30px;
        }

        @media (max-width: 640px) {
            .search-form {
                grid-template-columns: 1fr;
            }
            .app-header {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="app-header">
            <div class="brand">
                <div class="brand-title"><a href="{% url 'car_list' %}">Car Manager</a></div>
                <p class="brand-subtitle">A cleaner, faster CRUD experience for your fleet.</p>
            </div>
            <div class="header-actions">
                {% block header %}{% endblock %}
            </div>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="app-footer">Designed for polished workflows and easy management.</footer>
    </div>
</body>
</html>
