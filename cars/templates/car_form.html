{% extends "base.html" %}

{% block title %}Car Form{% endblock %}

{% block header %}
<a href="{% url 'car_list' %}" class="button secondary">Back to List</a>
{% endblock %}

{% block content %}
<section class="panel form-panel">
    <h1 class="section-title">Car Form</h1>
    <form method="POST" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="button primary">Save</button>
        </div>
    </form>
</section>
{% endblock %}
