
<h1>Login</h1>

{% if error %}

    <p style="color:red;">
        {{ error }}
    </p>

{% endif %}


<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Username"
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="{% url 'signup' %}">
    Signup
</a>
