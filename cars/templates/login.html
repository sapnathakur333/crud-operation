{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="panel form-panel">
    <h1 class="section-title">Login</h1>
    <p class="section-copy">Sign in to manage your car inventory with a clean, modern interface.</p>

    {% if error %}
    <div class="info-box">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="form-stack">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" placeholder="Username" class="text-input">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Password" class="text-input">
        </div>
        <div class="form-actions">
            <button type="submit" class="button primary">Login</button>
        </div>
    </form>

    <p class="form-help">Don’t have an account yet? <a href="{% url 'signup' %}">Signup</a></p>
</section>
{% endblock %}
