{% extends "base.html" %}

{% block title %}Signup{% endblock %}

{% block content %}
<section class="panel form-panel">
    <h1 class="section-title">Signup</h1>
    <p class="section-copy">Create a new account and start tracking your cars immediately.</p>
    <form method="POST" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="button primary">Signup</button>
        </div>
    </form>
    <p class="form-help">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</section>
{% endblock %}
