{% extends "base.html" %}

{% block title %}Add Car{% endblock %}

{% block header %}
<a href="{% url 'car_list' %}" class="button secondary">Back to List</a>
{% endblock %}

{% block content %}
<section class="panel form-panel">
    <h1 class="section-title">Add Car</h1>
    <p class="section-copy">Enter the vehicle details below to save a new car into your collection.</p>
    <form method="POST" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="button primary">Save Car</button>
        </div>
    </form>
</section>
{% endblock %}
